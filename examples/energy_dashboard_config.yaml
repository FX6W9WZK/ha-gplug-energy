# ─────────────────────────────────────────────────────────────────────────────
# Beispiel: Home Assistant Energy Dashboard Konfiguration für gPlug
# ─────────────────────────────────────────────────────────────────────────────
#
# Diese Datei zeigt, wie die gPlug Energy Sensoren optimal ins
# Energy Dashboard und in Lovelace-Dashboards integriert werden.
#
# Voraussetzung: Die Integration "gPlug Energy" ist installiert und
# hat die Sensoren bereits automatisch erstellt.
#
# ─────────────────────────────────────────────────────────────────────────────

# ┌───────────────────────────────────────────────────────────────────────────┐
# │  1. UTILITY METER – Tages-/Monats-/Jahresauswertungen                   │
# │     Füge diesen Block in deine configuration.yaml ein.                   │
# └───────────────────────────────────────────────────────────────────────────┘

utility_meter:
  # ── Energiebezug (Import) ──────────────────────────────────────────────
  strom_bezug_taeglich:
    source: sensor.gplugd_energy_import_total
    name: "Strombezug Täglich"
    cycle: daily

  strom_bezug_woche:
    source: sensor.gplugd_energy_import_total
    name: "Strombezug Wöchentlich"
    cycle: weekly

  strom_bezug_monat:
    source: sensor.gplugd_energy_import_total
    name: "Strombezug Monatlich"
    cycle: monthly

  strom_bezug_jahr:
    source: sensor.gplugd_energy_import_total
    name: "Strombezug Jährlich"
    cycle: yearly

  # ── Energieeinspeisung (Export / PV) ───────────────────────────────────
  strom_einspeisung_taeglich:
    source: sensor.gplugd_energy_export_total
    name: "Einspeisung Täglich"
    cycle: daily

  strom_einspeisung_monat:
    source: sensor.gplugd_energy_export_total
    name: "Einspeisung Monatlich"
    cycle: monthly

  strom_einspeisung_jahr:
    source: sensor.gplugd_energy_export_total
    name: "Einspeisung Jährlich"
    cycle: yearly


# ┌───────────────────────────────────────────────────────────────────────────┐
# │  2. TEMPLATE SENSOR – Netto-Leistung (Bezug minus Einspeisung)           │
# │     Zeigt ob gerade bezogen oder eingespeist wird.                       │
# └───────────────────────────────────────────────────────────────────────────┘

template:
  - sensor:
      - name: "Nettoleistung"
        unique_id: gplug_net_power
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        icon: >
          {% if states('sensor.gplugd_power_export') | float > 0 %}
            mdi:solar-power
          {% else %}
            mdi:transmission-tower
          {% endif %}
        state: >
          {% set import_power = states('sensor.gplugd_power_import') | float(0) %}
          {% set export_power = states('sensor.gplugd_power_export') | float(0) %}
          {{ (import_power - export_power) | round(3) }}

      - name: "Stromfluss Richtung"
        unique_id: gplug_power_direction
        icon: >
          {% if states('sensor.nettoleistung') | float > 0 %}
            mdi:arrow-down-bold
          {% else %}
            mdi:arrow-up-bold
          {% endif %}
        state: >
          {% if states('sensor.nettoleistung') | float > 0.01 %}
            Bezug
          {% elif states('sensor.nettoleistung') | float < -0.01 %}
            Einspeisung
          {% else %}
            Ausgeglichen
          {% endif %}


# ┌───────────────────────────────────────────────────────────────────────────┐
# │  3. LOVELACE DASHBOARD – Beispiel-Karten                                │
