# ┌───────────────────────────────────────────────────────────────────────────┐
# │  4. AUTOMATION – Beispiel: Benachrichtigung bei hohem Verbrauch          │
# └───────────────────────────────────────────────────────────────────────────┘

automation:
  - alias: "Warnung: Hoher Stromverbrauch"
    trigger:
      - platform: numeric_state
        entity_id: sensor.gplugd_power_import
        above: 5.0
        for:
          minutes: 5
    action:
      - service: notify.notify
        data:
          title: "⚡ Hoher Stromverbrauch"
          message: >
            Aktueller Bezug: {{ states('sensor.gplugd_power_import') }} kW
            seit 5 Minuten über 5 kW.

  - alias: "Info: PV-Einspeisung aktiv"
    trigger:
      - platform: numeric_state
        entity_id: sensor.gplugd_power_export
        above: 0.1
    action:
      - service: notify.notify
        data:
          title: "☀️ PV-Einspeisung aktiv"
          message: >
            Aktuelle Einspeisung: {{ states('sensor.gplugd_power_export') }} kW
